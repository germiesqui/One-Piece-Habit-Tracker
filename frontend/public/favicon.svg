<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Parchment background circle -->
  <circle cx="50" cy="50" r="48" fill="#f2e0b0" stroke="#a87422" stroke-width="3"/>
  <!-- Ship wheel -->
  <circle cx="50" cy="50" r="18" fill="none" stroke="#2a2820" stroke-width="4"/>
  <circle cx="50" cy="50" r="6" fill="#2a2820"/>
  <!-- 8 spokes -->
  <line x1="50" y1="8"  x2="50" y2="28" stroke="#2a2820" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="50" y1="72" x2="50" y2="92" stroke="#2a2820" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="8"  y1="50" x2="28" y2="50" stroke="#2a2820" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="72" y1="50" x2="92" y2="50" stroke="#2a2820" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="21" y1="21" x2="35" y2="35" stroke="#2a2820" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="65" y1="65" x2="79" y2="79" stroke="#2a2820" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="79" y1="21" x2="65" y2="35" stroke="#2a2820" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="21" y1="79" x2="35" y2="65" stroke="#2a2820" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Handle knobs -->
  <circle cx="50" cy="8"  r="4" fill="#a87422"/>
  <circle cx="50" cy="92" r="4" fill="#a87422"/>
  <circle cx="8"  cy="50" r="4" fill="#a87422"/>
  <circle cx="92" cy="50" r="4" fill="#a87422"/>
  <circle cx="21" cy="21" r="4" fill="#a87422"/>
  <circle cx="79" cy="79" r="4" fill="#a87422"/>
  <circle cx="79" cy="21" r="4" fill="#a87422"/>
  <circle cx="21" cy="79" r="4" fill="#a87422"/>
</svg>
